<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZimNOC — Zimbabwe Network Operations Centre</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ── COLOUR SYSTEM ──────────────────────────────────────────────────────
   Three background levels + one border + three content colours + three
   status colours. That is the complete palette. Nothing else.
   Every colour in the file below references one of these variables.
────────────────────────────────────────────────────────────────────── */
:root {
  /* Backgrounds — noticeably different from each other */
  --bg-page:    #0d1117;
  --bg-panel:   #161b22;
  --bg-card:    #21262d;
  --bg-hover:   #2d333b;

  /* Borders */
  --border:     #30363d;
  --border-hi:  #484f58;

  /* Content text */
  --text-hi:    #f0f6fc;
  --text-mid:   #8b949e;
  --text-lo:    #484f58;

  /* Status — used ONLY for status indicators, never for decoration */
  --ok:         #3fb950;   /* tower online / healthy */
  --warn:       #d29922;   /* tower degraded / high load */
  --err:        #f85149;   /* tower offline / critical */

  /* Single interactive accent */
  --accent:     #58a6ff;

  --font: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  --mono: 'Consolas', 'Cascadia Code', 'Courier New', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg-page); color: var(--text-hi); font-family: var(--font); overflow-x: hidden; font-size: 14px; line-height: 1.5; }
#root { height: 100%; display: flex; flex-direction: column; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-page); }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

button { cursor: pointer; font-family: var(--font); border: none; outline: none; }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
select { font-family: var(--font); }

@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.35} }
@keyframes fadeIn   { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideIn  { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
@keyframes dashFlow { to{stroke-dashoffset:-20} }

/* ── LAYOUT HELPERS ─────────────────────────────────────────────────── */
.info-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px;
  margin-bottom: 12px;
  font-size: 13px;
  color: var(--text-mid);
  line-height: 1.6;
}
.info-box strong { color: var(--text-hi); }
.info-box .label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.section-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-hi);
  margin-bottom: 2px;
}
.section-sub {
  font-size: 12px;
  color: var(--text-mid);
  margin-bottom: 14px;
  line-height: 1.5;
}
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-bottom: 14px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  text-align: center;
}
.stat-card .num  { font-size: 26px; font-weight: 700; }
.stat-card .lbl  { font-size: 11px; color: var(--text-mid); margin-top: 2px; }
.stat-card .desc { font-size: 11px; color: var(--text-lo); margin-top: 4px; line-height: 1.4; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// ── DATA ────────────────────────────────────────────────────────────────
const INITIAL_TOWERS = [
  { id:'HRE-001', name:'Harare CBD',     city:'Harare',   lat:164, lng:320, status:'online',   load:87, bw:94,  uptime:99.2, subs:4820, latMs:12,  pktLoss:0.1, type:'macro' },
  { id:'HRE-002', name:'Harare North',   city:'Harare',   lat:130, lng:295, status:'online',   load:62, bw:71,  uptime:98.8, subs:3210, latMs:14,  pktLoss:0.2, type:'macro' },
  { id:'HRE-003', name:'Chitungwiza',    city:'Harare',   lat:195, lng:348, status:'degraded', load:91, bw:45,  uptime:94.1, subs:5200, latMs:28,  pktLoss:1.8, type:'macro' },
  { id:'BYO-001', name:'Bulawayo CBD',   city:'Bulawayo', lat:390, lng:168, status:'online',   load:55, bw:82,  uptime:99.5, subs:2980, latMs:22,  pktLoss:0.1, type:'macro' },
  { id:'BYO-002', name:'Bulawayo West',  city:'Bulawayo', lat:398, lng:140, status:'online',   load:41, bw:68,  uptime:99.1, subs:1840, latMs:24,  pktLoss:0.3, type:'macro' },
  { id:'GWE-001', name:'Gweru Central',  city:'Gweru',    lat:298, lng:238, status:'online',   load:48, bw:61,  uptime:98.3, subs:1620, latMs:31,  pktLoss:0.4, type:'macro' },
  { id:'MTR-001', name:'Mutare CBD',     city:'Mutare',   lat:200, lng:470, status:'online',   load:59, bw:74,  uptime:97.9, subs:2140, latMs:35,  pktLoss:0.5, type:'macro' },
  { id:'MSV-001', name:'Masvingo',       city:'Masvingo', lat:350, lng:340, status:'online',   load:44, bw:57,  uptime:98.1, subs:1390, latMs:38,  pktLoss:0.6, type:'macro' },
  { id:'KWE-001', name:'Kwekwe',         city:'Kwekwe',   lat:268, lng:200, status:'degraded', load:78, bw:38,  uptime:91.2, subs:1180, latMs:52,  pktLoss:3.1, type:'macro' },
  { id:'RUR-001', name:'Binga Rural',    city:'Rural',    lat:310, lng:90,  status:'online',   load:28, bw:22,  uptime:95.4, subs:380,  latMs:68,  pktLoss:1.2, type:'rural' },
  { id:'RUR-002', name:'Buhera Rural',   city:'Rural',    lat:248, lng:430, status:'offline',  load:0,  bw:0,   uptime:0,    subs:0,    latMs:0,   pktLoss:100, type:'rural' },
  { id:'RUR-003', name:'Gokwe Rural',    city:'Rural',    lat:220, lng:148, status:'online',   load:35, bw:19,  uptime:93.7, subs:290,  latMs:82,  pktLoss:2.1, type:'rural' },
  { id:'RUR-004', name:'Chipinge Rural', city:'Rural',    lat:310, lng:490, status:'degraded', load:65, bw:14,  uptime:88.3, subs:420,  latMs:110, pktLoss:5.4, type:'rural' },
  { id:'HRE-004', name:'Epworth',        city:'Harare',   lat:190, lng:310, status:'online',   load:72, bw:68,  uptime:97.5, subs:2860, latMs:18,  pktLoss:0.4, type:'micro' },
  { id:'BYO-003', name:'Nketa',          city:'Bulawayo', lat:405, lng:155, status:'online',   load:50, bw:59,  uptime:98.7, subs:1540, latMs:26,  pktLoss:0.3, type:'micro' },
];

const LINKS = [
  { from:'HRE-001', to:'HRE-002', cap:1000, label:'Harare Ring North' },
  { from:'HRE-001', to:'HRE-003', cap:1000, label:'Harare Ring East'  },
  { from:'HRE-001', to:'HRE-004', cap:622,  label:'CBD – Epworth'     },
  { from:'HRE-001', to:'GWE-001', cap:622,  label:'Harare – Gweru'    },
  { from:'GWE-001', to:'BYO-001', cap:622,  label:'Gweru – Bulawayo'  },
  { from:'GWE-001', to:'KWE-001', cap:155,  label:'Gweru – Kwekwe'    },
  { from:'GWE-001', to:'MSV-001', cap:155,  label:'Gweru – Masvingo'  },
  { from:'HRE-001', to:'MTR-001', cap:310,  label:'Harare – Mutare'   },
  { from:'BYO-001', to:'BYO-002', cap:622,  label:'Bulawayo Ring'     },
  { from:'BYO-001', to:'BYO-003', cap:310,  label:'BYO – Nketa'       },
  { from:'BYO-001', to:'RUR-001', cap:34,   label:'BYO – Binga'       },
  { from:'MSV-001', to:'RUR-002', cap:34,   label:'MSV – Buhera'      },
  { from:'GWE-001', to:'RUR-003', cap:34,   label:'GWE – Gokwe'       },
  { from:'MTR-001', to:'RUR-004', cap:34,   label:'MTR – Chipinge'    },
  { from:'HRE-002', to:'HRE-001', cap:1000, label:'Harare Ring South' },
];

const GAPS = [
  { id:'g1', lat:255, lng:280, r:40, sev:'high',   name:'Midlands Desert Zone', pop:12400, dist:82,
    reason:'No tower within 82 km. Terrain is flat — a macro BTS here would cover a large radius.' },
  { id:'g2', lat:180, lng:390, r:35, sev:'medium', name:'Eastern Highlands Gap', pop:7800,  dist:45,
    reason:'Mountainous terrain causes signal shadowing. A ridge-mounted micro cell would resolve this.' },
  { id:'g3', lat:340, lng:200, r:30, sev:'high',   name:'Mberengwa Dead Zone',  pop:9200,  dist:68,
    reason:'Nearest tower is KWE-001 which is already degraded. Dual issue: range and capacity.' },
  { id:'g4', lat:280, lng:420, r:25, sev:'low',    name:'Save Valley Fringe',   pop:3400,  dist:32,
    reason:'Low population density. A small rural BTS or repeater is sufficient here.' },
];

const mkHistory = (base, variance, n=20) =>
  Array.from({length:n}, (_,i) => ({ t:i, v: Math.max(0, Math.min(100, base + (Math.random()-0.5)*variance*2)) }));

// ── DIJKSTRA SPF ────────────────────────────────────────────────────────
function spf(allTowers, links, src, dst) {
  const live = allTowers.filter(t => t.status !== 'offline');
  const dist = {}, prev = {};
  live.forEach(t => { dist[t.id] = Infinity; prev[t.id] = null; });
  dist[src] = 0;
  const Q = live.map(t => t.id);
  while (Q.length) {
    Q.sort((a,b) => dist[a]-dist[b]);
    const u = Q.shift();
    if (u === dst || dist[u] === Infinity) break;
    links.filter(l => l.from===u||l.to===u).forEach(link => {
      const v = link.from===u ? link.to : link.from;
      if (!Q.includes(v)) return;
      const tv = live.find(t => t.id===v);
      if (!tv) return;
      // Weight = sum of node latencies + capacity penalty
      // Lower capacity = higher weight = less preferred path
      const w = (live.find(t=>t.id===u)?.latMs||20) + (tv.latMs||20) + (1000/link.cap)*5;
      if (dist[u]+w < dist[v]) { dist[v]=dist[u]+w; prev[v]=u; }
    });
  }
  const path=[]; let c=dst;
  while(c){ path.unshift(c); c=prev[c]; }
  return { path, cost: dist[dst]===Infinity ? null : Math.round(dist[dst]) };
}

// ── COLOUR HELPERS ──────────────────────────────────────────────────────
// All colours go through these three functions — nothing hardcoded inline
const sColor = s => s==='online' ? 'var(--ok)' : s==='degraded' ? 'var(--warn)' : 'var(--err)';
const sHex   = s => s==='online' ? '#3fb950'    : s==='degraded' ? '#d29922'     : '#f85149';
const lColor = v => v>85 ? 'var(--err)' : v>70 ? 'var(--warn)' : 'var(--ok)';
const sevColor= s => s==='high' ? 'var(--err)' : s==='medium' ? 'var(--warn)' : 'var(--accent)';
const sevHex  = s => s==='high' ? '#f85149'     : s==='medium' ? '#d29922'     : '#58a6ff';

// ── SMALL COMPONENTS ────────────────────────────────────────────────────
function Dot({ status }) {
  return <span style={{ display:'inline-block', width:9, height:9, borderRadius:'50%', flexShrink:0,
    background:sColor(status), animation:status==='online'?'pulse 2.5s ease-in-out infinite':'none' }}
    aria-label={`Status: ${status}`}/>;
}

function Bar({ value, max=100, color }) {
  const pct = Math.min(100,(value/max)*100);
  const c = color||lColor(value);
  return (
    <div style={{ height:5, background:'rgba(255,255,255,0.08)', borderRadius:3, overflow:'hidden' }}>
      <div style={{ height:'100%', width:`${pct}%`, background:c, borderRadius:3, transition:'width 0.6s ease' }}/>
    </div>
  );
}

function Pill({ children, color='var(--accent)' }) {
  return <span style={{ fontSize:11, fontWeight:600, color, background:`${color}22`,
    border:`1px solid ${color}44`, padding:'1px 7px', borderRadius:10 }}>{children}</span>;
}

// ── SPARKLINE ───────────────────────────────────────────────────────────
function Spark({ data, color, height=36 }) {
  if (!data||data.length<2) return null;
  const W=300, H=height*3, pad=4;
  const minV=Math.min(...data.map(d=>d.v)), maxV=Math.max(...data.map(d=>d.v)), range=maxV-minV||1;
  const toX=i=>pad+(i/(data.length-1))*(W-pad*2);
  const toY=v=>H-pad-((v-minV)/range)*(H-pad*2);
  const pts=data.map((d,i)=>[toX(i),toY(d.v)]);
  let d=`M ${pts[0][0]} ${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const [x0,y0]=i>0?pts[i-1]:pts[i];
    const [x1,y1]=pts[i], [x2,y2]=pts[i+1];
    const [x3,y3]=i<pts.length-2?pts[i+2]:pts[i+1];
    d+=` C ${x1+(x2-x0)/6} ${y1+(y2-y0)/6}, ${x2-(x3-x1)/6} ${y2-(y3-y1)/6}, ${x2} ${y2}`;
  }
  const area=`${d} L ${pts[pts.length-1][0]} ${H} L ${pts[0][0]} ${H} Z`;
  const gid=`sg${color.replace(/[^a-z0-9]/gi,'')}`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={height} preserveAspectRatio="none"
      style={{display:'block'}} aria-hidden="true">
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${gid})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="3.5" strokeLinecap="round"/>
    </svg>
  );
}

// ── NETWORK MAP ─────────────────────────────────────────────────────────
function NetMap({ towers, links, selected, onSelect, routePath, showGaps }) {
  const W=560, H=520;
  const tById = id => towers.find(t=>t.id===id);
  const onPath = (a,b) => {
    if(!routePath||routePath.length<2) return false;
    for(let i=0;i<routePath.length-1;i++)
      if((routePath[i]===a&&routePath[i+1]===b)||(routePath[i]===b&&routePath[i+1]===a)) return true;
    return false;
  };
  const linkOk = l => {
    const ta=tById(l.from), tb=tById(l.to);
    if(!ta||!tb) return 'offline';
    if(ta.status==='offline'||tb.status==='offline') return 'offline';
    if(ta.status==='degraded'||tb.status==='degraded') return 'degraded';
    return 'online';
  };

  return (
    <div style={{ position:'relative', background:'var(--bg-panel)', border:'1px solid var(--border)', borderRadius:8, overflow:'hidden' }}>
      {/* Subtle grid */}
      <div style={{ position:'absolute', inset:0, backgroundImage:
        'linear-gradient(rgba(88,166,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(88,166,255,0.025) 1px,transparent 1px)',
        backgroundSize:'40px 40px', pointerEvents:'none' }}/>
      <svg width={W} height={H} style={{display:'block'}} role="img" aria-label="Zimbabwe LTE tower network map">
        <defs>
          <filter id="gnode"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>

        {/* Coverage gap circles */}
        {showGaps && GAPS.map(g=>(
          <g key={g.id}>
            <circle cx={g.lng} cy={g.lat} r={g.r} fill={`${sevHex(g.sev)}10`}
              stroke={sevHex(g.sev)} strokeWidth={1.5} strokeDasharray="6,4" opacity={0.8}/>
            <text x={g.lng} y={g.lat+5} textAnchor="middle" fill={sevHex(g.sev)}
              fontSize={9} fontFamily="var(--mono)">no signal</text>
          </g>
        ))}

        {/* Backbone links */}
        {links.map((l,i)=>{
          const ta=tById(l.from), tb=tById(l.to); if(!ta||!tb) return null;
          const active=onPath(l.from,l.to), ls=linkOk(l);
          const stroke = active ? '#58a6ff' : ls==='offline' ? '#f8514940' : ls==='degraded' ? '#d2992240' : '#30363d';
          return (
            <line key={i} x1={ta.lng} y1={ta.lat} x2={tb.lng} y2={tb.lat}
              stroke={stroke} strokeWidth={active?2.5:1.2}
              style={active?{animation:'dashFlow 1s linear infinite',strokeDasharray:'10,5'}:{}}
              opacity={active?1:0.9}/>
          );
        })}

        {/* Tower nodes */}
        {towers.map(t=>{
          const sel=selected?.id===t.id, inPath=routePath?.includes(t.id);
          const r=t.type==='macro'?8:t.type==='micro'?6:5;
          const col=sHex(t.status);
          return (
            <g key={t.id} onClick={()=>onSelect(t)} style={{cursor:'pointer'}}
              role="button" aria-label={`${t.name}: ${t.status}`}>
              {(sel||inPath) && <circle cx={t.lng} cy={t.lat} r={r+7} fill="none"
                stroke={inPath?'#58a6ff':col} strokeWidth={1.5} opacity={0.4}
                style={{animation:'pulse 2s ease-in-out infinite'}}/>}
              <circle cx={t.lng} cy={t.lat} r={r} fill={`${col}22`}
                stroke={col} strokeWidth={sel?2:1.5} filter="url(#gnode)"/>
              <circle cx={t.lng} cy={t.lat} r={3} fill={col}/>
              {(sel||t.status!=='online'||t.type==='rural') &&
                <text x={t.lng+11} y={t.lat+4} fontSize={9} fill={sel?'#f0f6fc':'#8b949e'}
                  fontFamily="var(--mono)" style={{pointerEvents:'none'}}>{t.id}</text>}
            </g>
          );
        })}

        {/* City labels */}
        {[['HARARE',320,145],['BULAWAYO',168,412],['GWERU',238,278],['MUTARE',470,184],['MASVINGO',340,365]].map(([c,x,y])=>(
          <text key={c} x={x} y={y} fontSize={9} fill="rgba(139,148,158,0.25)"
            fontFamily="var(--font)" fontWeight={700} letterSpacing={2} textAnchor="middle"
            style={{pointerEvents:'none',userSelect:'none'}}>{c}</text>
        ))}
      </svg>

      {/* Legend */}
      <div style={{position:'absolute',bottom:10,left:12,display:'flex',flexDirection:'column',gap:5,
        background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 10px'}}>
        {[['Online — signal healthy','var(--ok)'],['Degraded — high load or packet loss','var(--warn)'],['Offline — tower down','var(--err)']].map(([l,c])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:7}}>
            <div style={{width:9,height:9,borderRadius:'50%',background:c,flexShrink:0}}/>
            <span style={{fontSize:10,color:'var(--text-mid)'}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── TOWER DETAIL PANEL ──────────────────────────────────────────────────
function TowerDetail({ tower, onClose }) {
  const healthNote = t => {
    if(t.status==='offline') return { c:'var(--err)', msg:'Tower is offline. All subscribers on this site have lost service. The network has attempted to reroute their traffic to the nearest available tower.' };
    if(t.pktLoss>3) return { c:'var(--err)', msg:`Packet loss of ${t.pktLoss}% is above the 3% threshold. Users will experience call drops and slow data. Likely cause: backhaul link degradation or interference.` };
    if(t.load>85) return { c:'var(--warn)', msg:`Tower load is critically high at ${t.load}%. At this level the scheduler starts dropping lower-priority traffic. A new sector or capacity upgrade is recommended.` };
    if(t.latMs>80) return { c:'var(--warn)', msg:`Latency of ${t.latMs}ms is high — acceptable for data but will affect voice quality. Check the microwave backhaul link for congestion.` };
    return { c:'var(--ok)', msg:'All metrics are within normal operating ranges. Tower is serving subscribers without degradation.' };
  };
  const note = healthNote(tower);
  return (
    <div style={{width:270,borderLeft:'1px solid var(--border)',background:'var(--bg-panel)',
      padding:16,overflowY:'auto',animation:'slideIn 0.2s ease',flexShrink:0}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-mid)'}}>Tower Detail</div>
        <button onClick={onClose} aria-label="Close"
          style={{width:26,height:26,borderRadius:5,background:'var(--bg-card)',
            color:'var(--text-mid)',border:'1px solid var(--border)',fontSize:16,lineHeight:1}}>×</button>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
        <Dot status={tower.status}/>
        <span style={{fontSize:17,fontWeight:700}}>{tower.name}</span>
      </div>
      <div style={{fontSize:12,color:'var(--text-mid)',marginBottom:14}}>{tower.id} · {tower.city} · <Pill color={tower.type==='rural'?'var(--warn)':tower.type==='micro'?'var(--accent)':'var(--ok)'}>{tower.type} BTS</Pill></div>

      {/* Health note */}
      <div style={{padding:'10px 12px',background:'var(--bg-card)',border:`1px solid var(--border)`,
        borderLeft:`3px solid ${note.c}`,borderRadius:6,fontSize:12,color:'var(--text-mid)',lineHeight:1.55,marginBottom:14}}>
        {note.msg}
      </div>

      {/* Metrics grid */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
        {[
          ['Subscribers', tower.subs.toLocaleString(), 'People currently connected to this tower'],
          ['Uptime',      `${tower.uptime}%`,          'Percentage of time this tower has been operational'],
          ['Bandwidth',   `${tower.bw} Mbps`,          'Current data throughput on the backhaul link'],
          ['Latency',     `${tower.latMs} ms`,         'Round-trip signal delay. Under 50ms is healthy'],

// ── OUTAGE SIMULATOR ────────────────────────────────────────────────────
function OutageSim({ towers, setTowers }) {
  const [target, setTarget] = useState('HRE-003');
  const [log, setLog] = useState([]);
  const addLog = msg => setLog(p=>[{msg,ts:new Date().toLocaleTimeString('en-GB',{hour12:false}),id:Date.now()},...p].slice(0,15));
  const live = towers.filter(t=>t.status!=='offline');

  const doFail = () => {
    const t=towers.find(x=>x.id===target); if(!t||t.status==='offline') return;
    const adjacent=LINKS.filter(l=>l.from===target||l.to===target).map(l=>l.from===target?l.to:l.from);
    setTowers(p=>p.map(x=>x.id===target?{...x,status:'offline',load:0,bw:0,latMs:0,subs:0,pktLoss:100}:x));
    addLog(`FAILURE  ${t.name} [${target}] is offline — ${t.subs.toLocaleString()} subscribers lost service`);
    setTimeout(()=>addLog(`REROUTE  SPF recalculated — traffic shifted to ${adjacent.slice(0,2).join(' and ')}`),900);
  };

  const doCong = () => {
    const t=towers.find(x=>x.id===target); if(!t) return;
    setTowers(p=>p.map(x=>x.id===target?{...x,status:'degraded',load:Math.min(99,x.load+25),latMs:Math.round(x.latMs*2.4),pktLoss:+(x.pktLoss+4.2).toFixed(1)}:x));
    addLog(`CONGEST  ${t.name} [${target}] overloaded — latency doubled, packet loss spiked`);
  };

  const doRestore = () => { setTowers(INITIAL_TOWERS); setLog([]); addLog('RESTORE  All towers returned to baseline — network nominal'); };

  const sel={background:'var(--bg-card)',color:'var(--text-hi)',border:'1px solid var(--border)',
    borderRadius:6,padding:'7px 10px',fontSize:13,flex:1,outline:'none'};
  const btn=(label,color,fn)=>(
    <button key={label} onClick={fn} style={{flex:1,padding:'9px 4px',background:`${color}18`,
      color,border:`1px solid ${color}44`,borderRadius:6,fontSize:12,fontWeight:700,transition:'all 0.15s'}}
      onMouseEnter={e=>e.currentTarget.style.background=`${color}30`}
      onMouseLeave={e=>e.currentTarget.style.background=`${color}18`}>{label}</button>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',gap:10}}>
        <select value={target} onChange={e=>setTarget(e.target.value)} style={sel}>
          {live.map(t=><option key={t.id} value={t.id}>{t.id} — {t.name}</option>)}
        </select>
      </div>
      <div style={{display:'flex',gap:8}}>
        {btn('Simulate Failure',  '#f85149', doFail)}
        {btn('Simulate Congestion','#d29922', doCong)}
        {btn('Restore All',       '#3fb950', doRestore)}
      </div>
      {log.length>0&&(
        <div style={{background:'var(--bg-page)',border:'1px solid var(--border)',borderRadius:6,
          padding:12,maxHeight:200,overflowY:'auto'}} role="log" aria-live="polite">
          <div style={{fontSize:11,fontWeight:700,color:'var(--text-mid)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.06em'}}>NOC Event Log</div>
          {log.map(e=>(
            <div key={e.id} style={{fontSize:11,display:'flex',gap:10,marginBottom:5,animation:'slideIn 0.2s ease',fontFamily:'var(--mono)'}}>
              <span style={{color:'var(--text-lo)',flexShrink:0}}>{e.ts}</span>
              <span style={{color:'var(--text-mid)'}}>{e.msg}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── CIDR CALCULATOR ─────────────────────────────────────────────────────
function CIDRCalc() {
  const [cidr, setCidr] = useState('192.168.10.0/24');
  const [res, setRes] = useState(null);
  const [err, setErr] = useState('');
  const calc = () => {
    try {
      setErr('');
      const [ip,prefix]=cidr.trim().split('/');
      const pfx=parseInt(prefix,10);
      if(isNaN(pfx)||pfx<0||pfx>32) throw new Error('Prefix must be 0–32');
      const parts=ip.split('.').map(Number);
      if(parts.length!==4||parts.some(p=>isNaN(p)||p<0||p>255)) throw new Error('Invalid IP address');
      const toIP=n=>[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');
      const ipInt=parts.reduce((a,b)=>((a<<8)|b)>>>0);
      const mask=pfx===0?0:(0xFFFFFFFF<<(32-pfx))>>>0;
      const net=(ipInt&mask)>>>0, bcast=(net|(~mask>>>0))>>>0;
      setRes({ network:toIP(net)+'/'+pfx, mask:toIP(mask), broadcast:toIP(bcast),
        first:toIP(net+1), last:toIP(bcast-1), hosts:pfx>=31?0:bcast-net-1 });
    } catch(e) { setErr(e.message); setRes(null); }
  };
  return (
    <div>
      <div style={{display:'flex',gap:8,marginBottom:err?8:0}}>
        <input value={cidr} onChange={e=>setCidr(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&calc()}
          placeholder="e.g. 10.10.0.0/22"
          style={{flex:1,background:'var(--bg-card)',color:'var(--text-hi)',
            border:`1px solid ${err?'var(--err)':'var(--border)'}`,borderRadius:6,
            padding:'8px 12px',fontSize:13,outline:'none',fontFamily:'var(--mono)'}}
          aria-label="Enter CIDR notation"/>
        <button onClick={calc} style={{padding:'8px 18px',background:'var(--accent)',color:'#fff',
          borderRadius:6,fontSize:13,fontWeight:700}}>Calculate</button>
      </div>
      {err&&<div style={{fontSize:12,color:'var(--err)',marginBottom:8}}>⚠ {err}</div>}
      {res&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginTop:12,animation:'fadeIn 0.3s ease'}}>
          {[
            ['Network Address', res.network,  'The base address of this subnet'],
            ['Subnet Mask',     res.mask,     'Defines which part identifies the network'],
            ['Broadcast',       res.broadcast,'Last address — used to reach all devices'],
            ['First Host',      res.first,    'First assignable device address'],
            ['Last Host',       res.last,     'Last assignable device address'],
            ['Usable Hosts',    res.hosts.toLocaleString(),'Total devices this subnet can support'],
          ].map(([l,v,desc])=>(
            <div key={l} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:6,padding:'9px 10px'}}>
              <div style={{fontSize:10,color:'var(--text-lo)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>{l}</div>
              <div style={{fontSize:13,fontFamily:'var(--mono)',color:'var(--accent)',marginBottom:3,wordBreak:'break-all'}}>{v}</div>
              <div style={{fontSize:10,color:'var(--text-mid)',lineHeight:1.4}}>{desc}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

                alignItems:'center',gap:4,transition:'all 0.15s',
                background:tab===t.id?'rgba(88,166,255,0.12)':'transparent',
                border:tab===t.id?'1px solid rgba(88,166,255,0.25)':'1px solid transparent',
                color:tab===t.id?'var(--accent)':'var(--text-mid)'}}
              onMouseEnter={e=>{ if(tab!==t.id) e.currentTarget.style.background='var(--bg-hover)'; }}
              onMouseLeave={e=>{ if(tab!==t.id) e.currentTarget.style.background='transparent'; }}>
              <span style={{fontSize:18,lineHeight:1}}>{t.icon}</span>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.04em',textTransform:'uppercase',lineHeight:1}}>{t.label}</span>
            </button>
          ))}
        </nav>

        {/* Content */}
        <div style={{flex:1,display:'flex',overflow:'hidden'}}>

          {/* MAP TAB */}
          {tab==='map'&&(
            <div style={{flex:1,display:'flex',overflow:'hidden'}}>
              <div style={{flex:1,padding:16,overflowY:'auto'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                  <div>
                    <div className="section-title">LTE Tower Network — Zimbabwe</div>
                    <div className="section-sub">
                      This map shows the backbone of Zimbabwe's mobile network. Each circle is a cell tower (BTS — Base Transceiver Station).
                      The lines between them are the backhaul links — the fibre or microwave connections that carry traffic between towers and back to the core network.
                      Click any tower to inspect its current health metrics.
                    </div>
                  </div>
                  <button onClick={()=>setShowGaps(g=>!g)}
                    style={{padding:'7px 14px',whiteSpace:'nowrap',
                      background:showGaps?'rgba(248,81,73,0.12)':'var(--bg-card)',
                      color:showGaps?'var(--err)':'var(--text-mid)',
                      border:`1px solid ${showGaps?'rgba(248,81,73,0.35)':'var(--border)'}`,
                      borderRadius:6,fontSize:12,fontWeight:600,transition:'all 0.15s'}}>
                    {showGaps?'Hide':'Show'} Coverage Gaps
                  </button>
                </div>
                <NetMap towers={towers} links={LINKS} selected={selTower}
                  onSelect={t=>setSelTower(prev=>prev?.id===t.id?null:t)}
                  routePath={routePath} showGaps={showGaps}/>
              </div>
              {selTower&&<TowerDetail tower={selTower} onClose={()=>setSelTower(null)}/>}
            </div>
          )}

          {/* TOWERS TAB */}
          {tab==='towers'&&(
            <div style={{flex:1,padding:16,overflowY:'auto'}}>
              <div className="section-title">Tower Inventory</div>
              <div className="section-sub">
                All {towers.length} active cell towers in the Zimbabwe network. Each tower (BTS) serves a geographic area called a cell.
                Macro towers cover large areas (up to 35 km radius in flat terrain), micro cells cover smaller urban zones,
                and rural BTS sites serve low-density remote areas, typically connected via microwave backhaul rather than fibre.
                Colour-coded load bars show how close each tower is to its capacity limit — above 85% triggers congestion management.
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:10}}>
                {towers.map(t=>(
                  <div key={t.id} onClick={()=>{ setSelTower(t); setTab('map'); }}
                    role="button" tabIndex={0} onKeyDown={e=>e.key==='Enter'&&setTab('map')}
                    style={{padding:'12px 14px',background:'var(--bg-card)',borderRadius:8,cursor:'pointer',
                      border:`1px solid var(--border)`,borderLeft:`3px solid ${sHex(t.status)}`,
                      transition:'border-color 0.15s',animation:'fadeIn 0.3s ease'}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border-hi)'}
                    onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                      <Dot status={t.status}/>
                      <span style={{fontWeight:700,fontSize:14,flex:1}}>{t.name}</span>
                      <Pill color={t.type==='rural'?'var(--warn)':t.type==='micro'?'var(--accent)':'var(--ok)'}>{t.type}</Pill>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'5px 14px',marginBottom:8,fontSize:12}}>
                      {[
                        ['Tower ID', t.id],
                        ['Subscribers', t.subs.toLocaleString()],
                        ['Bandwidth', `${t.bw} Mbps`],
                        ['Latency', `${t.latMs} ms`],
                      ].map(([k,v])=>(
                        <div key={k}>
                          <div style={{fontSize:10,color:'var(--text-lo)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}}>{k}</div>
                          <div style={{color:'var(--text-hi)',fontFamily:'var(--mono)'}}>{v}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{fontSize:11,color:'var(--text-mid)',marginBottom:5}}>Load — {t.load}% {t.load>85?'⚠ critical':t.load>70?'↑ high':'✓ normal'}</div>
                    <Bar value={t.load}/>
                    <div style={{marginTop:6,display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text-mid)'}}>
                      <span>Uptime: <strong style={{color:'var(--ok)'}}>{t.uptime}%</strong></span>
                      <span>Pkt loss: <strong style={{color:t.pktLoss>2?'var(--err)':t.pktLoss>1?'var(--warn)':'var(--ok)'}}>{t.pktLoss}%</strong></span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ROUTING TAB */}
          {tab==='route'&&(
            <div style={{flex:1,padding:16,overflowY:'auto',maxWidth:720}}>
              <div className="section-title">SPF Route Finder</div>
              <div className="section-sub">
                Real mobile networks use Shortest Path First (SPF) algorithms — specifically OSPF (Open Shortest Path First) — to decide how traffic moves between towers.
                This tool implements Dijkstra's algorithm: it finds the lowest-cost path between any two towers, weighing both
                latency (signal delay at each node) and link capacity (how much bandwidth the connection supports).
                Towers that are offline are automatically excluded from the graph.
              </div>
              <div className="info-box">
                <div className="label">How the weight is calculated</div>
                The cost of each link = latency at node A + latency at node B + (1000 ÷ link capacity in Mbps) × 5.
                This means a 1 Gbps fibre link costs ~5 weight units, while a 34 Mbps rural microwave link costs ~150 — naturally pushing traffic toward high-capacity paths.
              </div>
              <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:16,marginBottom:14}}>
                <RoutePanel towers={towers} setRoutePath={setRoutePath}/>
              </div>
              <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:16}}>
                <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Backbone Link Inventory</div>
                <div style={{fontSize:12,color:'var(--text-mid)',marginBottom:12}}>
                  These are the physical connections between towers. Capacity determines traffic priority in the SPF algorithm.
                  Higher Mbps = lower routing cost = preferred path. Links under 155 Mbps are rural microwave hops — higher latency, lower reliability.
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {LINKS.map((l,i)=>{
                    const ta=towers.find(t=>t.id===l.from), tb=towers.find(t=>t.id===l.to);
                    const ok=ta&&tb&&ta.status!=='offline'&&tb.status!=='offline';
                    const deg=ta?.status==='degraded'||tb?.status==='degraded';
                    return (
                      <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',
                        background:'var(--bg-panel)',border:'1px solid var(--border)',borderRadius:6,fontSize:12}}>
                        <div style={{width:8,height:8,borderRadius:'50%',flexShrink:0,
                          background:ok?(deg?'var(--warn)':'var(--ok)'):'var(--err)'}}/>
                        <span style={{color:'var(--accent)',fontFamily:'var(--mono)',width:76,flexShrink:0}}>{l.from}</span>
                        <span style={{color:'var(--text-lo)'}}>——›</span>
                        <span style={{color:'var(--accent)',fontFamily:'var(--mono)',width:76,flexShrink:0}}>{l.to}</span>
                        <span style={{color:'var(--text-mid)',flex:1}}>{l.label}</span>
                        <Pill color={l.cap>=622?'var(--ok)':l.cap>=155?'var(--accent)':'var(--warn)'}>{l.cap} Mbps</Pill>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* SIMULATOR TAB */}
          {tab==='sim'&&(
            <div style={{flex:1,padding:16,overflowY:'auto',maxWidth:720}}>
              <div className="section-title">Outage & Congestion Simulator</div>
              <div className="section-sub">
                NOC engineers constantly test network resilience — the ability of the network to keep working even when something breaks.
                This simulator lets you inject real failure scenarios and observe how the network responds.
                It mirrors what happens in an actual NOC during incidents: a tower goes down, the SPF algorithm recalculates routes in real time,
                and traffic is rerouted through the next best available path.
              </div>
              <div className="info-box">
                <div className="label">What each scenario tests</div>
                <strong>Failure</strong> — simulates a power outage or hardware fault. The tower goes offline and all connected subscribers lose service.
                The network immediately runs SPF to find alternate routes through adjacent towers.
                <br/><br/>
                <strong>Congestion</strong> — simulates peak-hour overload. The tower stays online but latency doubles and packet loss spikes above threshold,
                degrading voice and data quality for users on that site.
              </div>
              <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:16,marginBottom:14}}>
                <OutageSim towers={towers} setTowers={setTowers}/>
              </div>
              <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:16}}>
                <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Live Tower Health Matrix</div>
                <div style={{fontSize:12,color:'var(--text-mid)',marginBottom:12}}>
                  Real-time snapshot of every tower. Load bars above 85% are critical. Latency above 80ms and packet loss above 3% indicate backhaul problems.
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {towers.map(t=>(
                    <div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
                      background:'var(--bg-panel)',border:'1px solid var(--border)',borderRadius:6}}>
                      <Dot status={t.status}/>
                      <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',width:70,flexShrink:0}}>{t.id}</span>
                      <span style={{fontSize:13,fontWeight:600,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</span>
                      <div style={{width:90,flexShrink:0}}><Bar value={t.load}/></div>
                      <span style={{fontSize:11,color:t.latMs>80?'var(--err)':t.latMs>40?'var(--warn)':'var(--ok)',
                        width:54,textAlign:'right',fontFamily:'var(--mono)',flexShrink:0}}>{t.latMs} ms</span>
                      <span style={{fontSize:11,color:t.pktLoss>2?'var(--err)':t.pktLoss>1?'var(--warn)':'var(--ok)',
                        width:44,textAlign:'right',fontFamily:'var(--mono)',flexShrink:0}}>{t.pktLoss}%</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* COVERAGE TAB */}
          {tab==='gaps'&&(
            <div style={{flex:1,padding:16,overflowY:'auto',maxWidth:720}}>
              <div className="section-title">Rural Coverage Gap Analysis</div>
              <div className="section-sub">
                LTE signals travel roughly 5–10 km from a macro tower in flat terrain, less in hilly or forested areas.
                Any community further than that from the nearest tower has no mobile signal — these are called dead zones or coverage gaps.
                Identifying and prioritising these gaps is one of the core responsibilities of a network planning team.
                The analysis below uses population data and distance-to-nearest-tower to rank which gaps should be addressed first.
              </div>
              <div className="info-box">
                <div className="label">Tower types used in rural deployment</div>
                A <strong>Macro BTS</strong> is a full-size tower — expensive to deploy but covers a wide area, ideal for high-population gaps.
                A <strong>Micro cell</strong> is smaller and cheaper, suited for targeted coverage in difficult terrain.
                A <strong>Repeater</strong> simply amplifies an existing signal — lowest cost but only works when a source tower is within range.
              </div>
              <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:16}}>
                <GapsPanel/>
              </div>
              <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:16,marginTop:14}}>
                <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>IP Subnet Planner</div>
                <div style={{fontSize:12,color:'var(--text-mid)',marginBottom:12,lineHeight:1.6}}>
                  Every new tower deployment requires an IP address block — a subnet — to be assigned for the equipment at that site
                  (the BTS, the backhaul router, the operations management system).
                  CIDR (Classless Inter-Domain Routing) notation like <code style={{fontFamily:'var(--mono)',color:'var(--accent)'}}>192.168.10.0/24</code> defines
                  both the network address and how many devices it can accommodate.
                  A /24 gives 254 usable addresses; a /30 gives only 2 — used for point-to-point microwave links.
                </div>
                <CIDRCalc/>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(e){ return {err:e}; }
  componentDidCatch(e,i){ console.error('[ZimNOC]',e,i); }
  render(){
    if(!this.state.err) return this.props.children;
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:32,fontFamily:'var(--font)'}}>
        <div style={{maxWidth:600,background:'var(--bg-panel)',border:'1px solid var(--err)',borderRadius:8,padding:32}}>
          <div style={{color:'var(--err)',fontSize:18,fontWeight:700,marginBottom:14}}>⚠ Runtime Error</div>
          <pre style={{color:'var(--text-hi)',fontSize:12,whiteSpace:'pre-wrap',background:'var(--bg-page)',padding:14,borderRadius:6,overflowX:'auto',marginBottom:14}}>
            {String(this.state.err)}
          </pre>
          <button onClick={()=>window.location.reload()}
            style={{padding:'8px 20px',background:'rgba(248,81,73,0.15)',color:'var(--err)',
              border:'1px solid rgba(248,81,73,0.35)',borderRadius:6,fontSize:13,cursor:'pointer'}}>
            Reload
          </button>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
