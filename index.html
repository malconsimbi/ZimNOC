// ─── DIJKSTRA ─────────────────────────────────────────────────────────
function dijkstra(towers, links, srcId, dstId, deadTowers=[]) {
  const nodes = towers.map(t=>t.id);
  const dist = {}; const prev = {}; const visited = new Set();
  nodes.forEach(n=>{ dist[n]=Infinity; prev[n]=null; });
  dist[srcId]=0;
  const queue = [...nodes];
  while(queue.length) {
    queue.sort((a,b)=>dist[a]-dist[b]);
    const u = queue.shift();
    if(u===dstId) break;
    if(dist[u]===Infinity) break;
    visited.add(u);
    const neighbors = links.filter(l=>(l.from===u||l.to===u));
    for(const link of neighbors) {
      const v = link.from===u ? link.to : link.from;
      if(visited.has(v)) continue;
      const towerV = towers.find(t=>t.id===v);
      if(deadTowers.includes(v) || (towerV && towerV.status==='offline')) continue;
      const towerU = towers.find(t=>t.id===u);
      const latencyU = towerU ? towerU.lat_ms : 20;
      const latencyV = towerV ? towerV.lat_ms : 20;
      const capacityFactor = 1000/link.capacity;
      const weight = latencyU + latencyV + capacityFactor * 5;
      const alt = dist[u] + weight;
      if(alt < dist[v]) { dist[v]=alt; prev[v]=u; }
    }
  }
  const path=[]; let cur=dstId;
  while(cur){ path.unshift(cur); cur=prev[cur]; }
  return { path, cost: dist[dstId] };
}

// ─── COMPONENTS ───────────────────────────────────────────────────────
function StatusDot({ status, pulse=true }) {

    <span style={{ display:'inline-block', width:8, height:8, borderRadius:'50%',

// ─── NETWORK MAP ──────────────────────────────────────────────────────
function NetworkMap({ towers, links, selectedTower, onSelectTower, routePath, showGaps, gaps }) {
  const W=560, H=520;
  const getT = id => towers.find(t=>t.id===id);
  const isOnPath = (a,b) => {
    if(!routePath||routePath.length<2) return false;
    for(let i=0;i<routePath.length-1;i++)
      if((routePath[i]===a&&routePath[i+1]===b)||(routePath[i]===b&&routePath[i+1]===a)) return true;
    return false;
  };
  const linkStatus = (l) => {
    const ta=getT(l.from),tb=getT(l.to);
    if(!ta||!tb) return 'offline';
    if(ta.status==='offline'||tb.status==='offline') return 'offline';
    if(ta.status==='degraded'||tb.status==='degraded') return 'degraded';
    return 'online';
  };

  return (
    <div style={{ position:'relative', background:'var(--bg-elevated)', border:'1px solid var(--border)',
      borderRadius:4, overflow:'hidden' }}>
      {/* Grid overlay */}
      <div style={{ position:'absolute', inset:0, backgroundImage:
        'linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px)',
        backgroundSize:'40px 40px', pointerEvents:'none' }} />
      <svg width={W} height={H} style={{ display:'block' }} role="img" aria-label="Zimbabwe network topology map">
        <defs>
          <filter id="glow-g"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="glow-r"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
            <path d="M0,0 L0,6 L6,3 z" fill="rgba(0,212,255,0.4)" />
          </marker>
        </defs>

        {/* Coverage gap zones */}
        {showGaps && gaps.map(g=>(
          <g key={g.id}>
            <circle cx={g.lng} cy={g.lat} r={g.radius} fill={`${severityColor(g.severity)}12`}
              stroke={severityColor(g.severity)} strokeWidth={1} strokeDasharray="5,3" opacity={0.7}/>
            <text x={g.lng} y={g.lat+4} textAnchor="middle" fill={severityColor(g.severity)}
              fontSize={8} fontFamily="var(--font-mono)" opacity={0.9}>⚠</text>
          </g>
        ))}

        {/* Links */}
        {links.map((l,i)=>{
          const ta=getT(l.from),tb=getT(l.to);
          if(!ta||!tb) return null;
          const onPath=isOnPath(l.from,l.to);
          const ls=linkStatus(l);
          const color=onPath?'#00d4ff':ls==='online'?'#1a3048':ls==='degraded'?'#ffb80050':'#ff3b5c30';
          const sw=onPath?2.5:ls==='online'?1:1.5;
          return (
            <line key={i} x1={ta.lng} y1={ta.lat} x2={tb.lng} y2={tb.lat}
              stroke={color} strokeWidth={sw}
              strokeDasharray={ls==='degraded'?'4,3':onPath?'none':'none'}
              style={onPath?{animation:'dash 0.8s linear infinite',strokeDasharray:'8,4',strokeDashoffset:0}:{}}
              opacity={onPath?1:0.8} />
          );
        })}

        {/* Towers */}
        {towers.map(t=>{
          const sel=selectedTower?.id===t.id;
          const onPath=routePath&&routePath.includes(t.id);
          const r=t.type==='macro'?9:t.type==='micro'?7:6;
          return (
            <g key={t.id} style={{ cursor:'pointer' }} onClick={()=>onSelectTower(t)}
              role="button" aria-label={`${t.name}: ${t.status}`}>
              {(sel||onPath)&&(
                <circle cx={t.lng} cy={t.lat} r={r+8} fill="none"
                  stroke={onPath?'#00d4ff':statusColor(t.status)} strokeWidth={1.5}
                  opacity={0.5} style={{ animation:'pulse 1.5s ease-in-out infinite' }} />
              )}
              <circle cx={t.lng} cy={t.lat} r={r} fill={statusBg(t.status)}
                stroke={sel?'white':statusColor(t.status)}
                strokeWidth={sel?2:1.5}
                filter={t.status!=='offline'?'url(#glow-g)':undefined}
                style={{ transition:'all 0.2s' }}/>
              <circle cx={t.lng} cy={t.lat} r={3} fill={statusColor(t.status)} />
              {(sel||t.status==='offline'||t.status==='degraded'||t.type==='rural') && (
                <text x={t.lng+12} y={t.lat+4} fontSize={9} fill={sel?'white':'var(--text-secondary)'}
                  fontFamily="var(--font-mono)" style={{ pointerEvents:'none' }}>
                  {t.id}
                </text>
              )}
            </g>
          );
        })}

        {/* City labels */}
        {[['Harare',320,148],['Bulawayo',168,415],['Gweru',238,282],['Mutare',470,188],['Masvingo',340,368]].map(([c,x,y])=>(
          <text key={c} x={x} y={y} fontSize={10} fill="rgba(122,176,204,0.3)"
            fontFamily="var(--font-display)" fontWeight={700} letterSpacing="0.12em"
            textAnchor="middle" style={{ pointerEvents:'none', userSelect:'none' }}>
            {c.toUpperCase()}
          </text>
        ))}
      </svg>

      {/* Legend */}
      <div style={{ position:'absolute', bottom:10, left:10, display:'flex', flexDirection:'column', gap:4 }}>
        {[['Online','#00ff88'],['Degraded','#ffb800'],['Offline','#ff3b5c']].map(([l,c])=>(
          <div key={l} style={{ display:'flex', alignItems:'center', gap:5 }}>
            <div style={{ width:8,height:8,borderRadius:'50%',background:c,boxShadow:`0 0 5px ${c}` }}/>
            <span style={{ fontSize:9, color:'var(--text-muted)', fontFamily:'var(--font-display)', fontWeight:600, letterSpacing:'0.08em' }}>{l}</span>
          </div>
        ))}
        {showGaps && <div style={{ display:'flex',alignItems:'center',gap:5 }}>
          <div style={{ width:8,height:8,border:'1px dashed #ff3b5c',borderRadius:'50%' }}/>
          <span style={{ fontSize:9,color:'var(--text-muted)',fontFamily:'var(--font-display)',fontWeight:600,letterSpacing:'0.08em' }}>Coverage Gap</span>
        </div>}
      </div>
    </div>
  );
}

          </div>
        ))}

      <MetricBar value={tower.load} color={loadColor(tower.load)}/>
      <div style={{ marginTop:4,display:'flex',justifyContent:'space-between' }}>
        <span style={{ fontSize:9,color:'var(--text-muted)' }}>Uptime: <span style={{ color:'#00ff88' }}>{tower.uptime}%</span></span>
        <span style={{ fontSize:9,color:'var(--text-muted)' }}>Lat: <span style={{ color:tower.lat_ms>80?'#ff3b5c':tower.lat_ms>40?'#ffb800':'#00ff88' }}>{tower.lat_ms}ms</span></span>
      </div>
    </div>
  );
}

// ─── ROUTING PANEL ────────────────────────────────────────────────────
function RoutingPanel({ towers, links, routePath, setRoutePath }) {
  const [src, setSrc] = useState('HRE-001');
  const [dst, setDst] = useState('BYO-001');
  const [result, setResult] = useState(null);

  const compute = useCallback(() => {
    const r = dijkstra(towers, links, src, dst);
    setResult(r);
    setRoutePath(r.path);
  }, [towers, links, src, dst, setRoutePath]);

  const clearRoute = () => { setResult(null); setRoutePath([]); };

// ─── OUTAGE SIMULATOR ────────────────────────────────────────────────
function OutageSimulator({ towers, setTowers, links }) {
  const [simLog, setSimLog] = useState([]);

  const log = msg => setSimLog(prev=>[{ msg, ts:new Date().toLocaleTimeString('en-GB',{hour12:false}), id:Date.now() },...prev].slice(0,12));

  const simulateFailure = (towerId) => {
    const t = towers.find(x=>x.id===towerId);
    if(!t||t.status==='offline') return;
    const affectedLinks = links.filter(l=>l.from===towerId||l.to===towerId);
    const affectedTowers = [...new Set(affectedLinks.flatMap(l=>[l.from,l.to]).filter(id=>id!==towerId))];
    const affectedSubs = t.subscribers;
    setTowers(prev=>prev.map(x=>x.id===towerId?{...x,status:'offline',load:0,bandwidth:0,lat_ms:0,subscribers:0}:x));
    log(`⚠ FAILURE: ${t.name} [${towerId}] went offline — ${affectedSubs.toLocaleString()} subscribers affected`);
    // Simulate rerouting
    setTimeout(()=>{
      log(`↺ REROUTING: Traffic redistributed via ${affectedTowers.slice(0,2).join(', ')}`);
    }, 800);
  };

  const simulateCongestion = (towerId) => {
    const t = towers.find(x=>x.id===towerId);
    if(!t) return;
    setTowers(prev=>prev.map(x=>x.id===towerId?{...x,status:'degraded',load:Math.min(99,x.load+25),lat_ms:x.lat_ms*2.5,packet_loss:x.packet_loss+4}:x));
    log(`⚡ CONGESTION: ${t.name} [${towerId}] overloaded — packet loss ↑ rerouting...`);
  };

  const restoreAll = () => {
    setTowers(INITIAL_TOWERS);
    setSimLog([]);
    log('✓ RECOVERY: All towers restored to operational state');
  };

  const onlineTowers = towers.filter(t=>t.status!=='offline');

  const selStyle = { background:'var(--bg-elevated)',color:'var(--text-primary)',border:'1px solid var(--border)',
    borderRadius:3,padding:'6px 8px',fontSize:11,fontFamily:'var(--font-mono)',flex:1,outline:'none' };

  const [simTarget, setSimTarget] = useState('HRE-003');

  return (
    <div style={{ display:'flex',flexDirection:'column',gap:12 }}>
      <div style={{ display:'flex',gap:8 }}>
        <select value={simTarget} onChange={e=>setSimTarget(e.target.value)} style={selStyle} aria-label="Simulation target tower">
          {onlineTowers.map(t=>(
            <option key={t.id} value={t.id}>{t.id} — {t.name}</option>
          ))}
        </select>
      </div>
      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8 }}>
        {[
          ['Simulate Failure','#ff3b5c',()=>simulateFailure(simTarget)],
          ['Simulate Congestion','#ffb800',()=>simulateCongestion(simTarget)],
          ['Restore All','#00ff88',restoreAll],
        ].map(([label,color,fn])=>(
          <button key={label} onClick={fn}
            style={{ padding:'8px 4px',background:`${color}10`,color,border:`1px solid ${color}30`,
              borderRadius:3,fontSize:10,fontFamily:'var(--font-display)',fontWeight:700,
              letterSpacing:'0.06em',textTransform:'uppercase',transition:'all 0.15s',cursor:'pointer' }}
            onMouseEnter={e=>e.currentTarget.style.background=`${color}20`}
            onMouseLeave={e=>e.currentTarget.style.background=`${color}10`}>
            {label}
          </button>
        ))}
      </div>

      {simLog.length>0 && (
        <div style={{ background:'var(--bg-void)',border:'1px solid var(--border)',borderRadius:3,
          padding:10,maxHeight:180,overflowY:'auto' }} role="log" aria-live="polite" aria-label="Simulation event log">
          <div style={{ fontSize:9,color:'var(--text-muted)',marginBottom:6,fontFamily:'var(--font-display)',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase' }}>Event Log</div>
          {simLog.map(e=>(
            <div key={e.id} style={{ fontSize:10,color:'var(--text-secondary)',marginBottom:4,
              fontFamily:'var(--font-mono)',display:'flex',gap:8, animation:'slideIn 0.2s ease' }}>
              <span style={{ color:'var(--text-dim)',flexShrink:0 }}>{e.ts}</span>
              <span>{e.msg}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── SPARKLINE (pure SVG — no Recharts dependency) ───────────────────
// Converts an array of {t, v} points into a smooth SVG area+line chart.
// Works with file://, no external libraries, no animation crashes.
function SparkLine({ data, color, height=40 }) {
  if (!data || data.length < 2) return null;
  const W = 300; // internal viewBox width
  const H = height * 3; // internal viewBox height (scaled up for crisp rendering)
  const pad = 4;
  const minV = Math.min(...data.map(d=>d.v));
  const maxV = Math.max(...data.map(d=>d.v));
  const range = maxV - minV || 1;
  const toX = i => pad + (i / (data.length - 1)) * (W - pad * 2);
  const toY = v => H - pad - ((v - minV) / range) * (H - pad * 2);
  const pts = data.map((d, i) => [toX(i), toY(d.v)]);

  // Smooth polyline using cardinal spline approximation
  let pathD = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const x0 = i > 0 ? pts[i-1][0] : pts[i][0];
    const y0 = i > 0 ? pts[i-1][1] : pts[i][1];
    const x1 = pts[i][0], y1 = pts[i][1];
    const x2 = pts[i+1][0], y2 = pts[i+1][1];
    const x3 = i < pts.length - 2 ? pts[i+2][0] : x2;
    const y3 = i < pts.length - 2 ? pts[i+2][1] : y2;
    const cp1x = x1 + (x2 - x0) / 6;
    const cp1y = y1 + (y2 - y0) / 6;
    const cp2x = x2 - (x3 - x1) / 6;
    const cp2y = y2 - (y3 - y1) / 6;
    pathD += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x2} ${y2}`;
  }
  const areaD = `${pathD} L ${pts[pts.length-1][0]} ${H} L ${pts[0][0]} ${H} Z`;
  const gradId = `sg_${color.replace(/[^a-z0-9]/gi,'_')}`;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={height}
      preserveAspectRatio="none" style={{ display:'block', overflow:'visible' }}
      aria-hidden="true">
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor={color} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={areaD} fill={`url(#${gradId})`} stroke="none"/>
      <path d={pathD}  fill="none" stroke={color} strokeWidth="4"
        strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

                    </div>

                  {selectedTower.status==='offline' && (
                    <div style={{ marginTop:14,padding:'8px 10px',background:'rgba(255,59,92,0.08)',

                      ✗ Tower offline — all subscribers affected. Automatic failover initiated.
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* Towers list */}
          {activeTab==='towers' && (

                {towers.map(t=>(
                  <TowerCard key={t.id} tower={t} selected={selectedTower?.id===t.id}

            </div>

          {/* Routing */}
          {activeTab==='route' && (
            <div style={{ flex:1,padding:16,overflowY:'auto',maxWidth:700 }}>
              <SectionHeader title="Dijkstra SPF Routing" sub="Shortest Path First — automatic failure-aware rerouting"/>
              <div style={{ background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:4,padding:16,marginBottom:16 }}>
                <RoutingPanel towers={towers} links={LINKS} routePath={routePath} setRoutePath={setRoutePath}/>
              </div>
              <div style={{ background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:4,padding:16 }}>
                <SectionHeader title="Link Inventory" sub={`${LINKS.length} backbone links`}/>
                <div style={{ display:'flex',flexDirection:'column',gap:6 }}>
                  {LINKS.map((l,i)=>{
                    const ta=towers.find(t=>t.id===l.from),tb=towers.find(t=>t.id===l.to);
                    const ok=ta&&tb&&ta.status!=='offline'&&tb.status!=='offline';
                    const deg=ta?.status==='degraded'||tb?.status==='degraded';
                    return (
                      <div key={i} style={{ display:'flex',alignItems:'center',gap:10,padding:'7px 10px',
                        background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:3,fontSize:10 }}>
                        <div style={{ width:7,height:7,borderRadius:'50%',flexShrink:0,
                          background:ok?(deg?'#ffb800':'#00ff88'):'#ff3b5c',
                          boxShadow:`0 0 5px ${ok?(deg?'#ffb800':'#00ff88'):'#ff3b5c'}` }}/>
                        <span style={{ color:'var(--accent-cyan)',fontFamily:'var(--font-mono)',width:80,flexShrink:0 }}>{l.from}</span>
                        <span style={{ color:'var(--text-dim)' }}>——›</span>
                        <span style={{ color:'var(--accent-cyan)',fontFamily:'var(--font-mono)',width:80,flexShrink:0 }}>{l.to}</span>
                        <span style={{ color:'var(--text-secondary)',flex:1 }}>{l.label}</span>
                        <Tag color={l.capacity>=622?'#00d4ff':l.capacity>=155?'#00ff88':'#9d4edd'}>{l.capacity} Mbps</Tag>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* Outage Simulator */}
          {activeTab==='outage' && (
            <div style={{ flex:1,padding:16,overflowY:'auto',maxWidth:700 }}>
              <SectionHeader title="Outage & Congestion Simulator" sub="NOC-grade failure injection and auto-rerouting"/>
              <div style={{ background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:4,padding:16,marginBottom:16 }}>
                <OutageSimulator towers={towers} setTowers={setTowers} links={LINKS}/>
              </div>
              <div style={{ background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:4,padding:16 }}>
                <SectionHeader title="Current Tower Health Matrix"/>
                <div style={{ display:'flex',flexDirection:'column',gap:6 }}>
                  {towers.map(t=>(
                    <div key={t.id} style={{ display:'flex',alignItems:'center',gap:10,padding:'8px 12px',
                      background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:3 }}>
                      <StatusDot status={t.status}/>
                      <span style={{ fontFamily:'var(--font-mono)',fontSize:10,color:'var(--accent-cyan)',width:72,flexShrink:0 }}>{t.id}</span>
                      <span style={{ fontSize:11,fontFamily:'var(--font-display)',fontWeight:600,flex:1 }}>{t.name}</span>
                      <div style={{ width:80 }}><MetricBar value={t.load}/></div>
                      <span style={{ fontSize:10,color:t.lat_ms>80?'#ff3b5c':t.lat_ms>40?'#ffb800':'#00ff88',width:48,textAlign:'right',fontFamily:'var(--font-mono)' }}>{t.lat_ms}ms</span>
                      <span style={{ fontSize:10,color:t.packet_loss>2?'#ff3b5c':t.packet_loss>1?'#ffb800':'#00ff88',width:48,textAlign:'right',fontFamily:'var(--font-mono)' }}>{t.packet_loss}%</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Coverage Gaps */}
          {activeTab==='gaps' && (
            <div style={{ flex:1,padding:16,overflowY:'auto',maxWidth:700 }}>
              <SectionHeader title="Rural Coverage Gap Analyzer" sub="Identify underserved zones & optimal tower placement"/>
              <div style={{ background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:4,padding:16,marginBottom:16 }}>
                <CoverageGapPanel gaps={COVERAGE_GAPS} towers={towers}/>
              </div>

              {/* Subnet/CIDR calculator */}
              <div style={{ background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:4,padding:16 }}>
                <SectionHeader title="CIDR Subnet Planner" sub="Calculate address space for new rural deployments"/>
                <CIDRCalculator/>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── CIDR CALCULATOR ─────────────────────────────────────────────────
function CIDRCalculator() {
  const [cidr, setCidr] = useState('192.168.10.0/24');
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');

  const calculate = () => {
    try {
      setError('');
      const [ip, prefix] = cidr.trim().split('/');
      const pfx = parseInt(prefix, 10);
      if(isNaN(pfx)||pfx<0||pfx>32) throw new Error('Invalid prefix length');
      const parts = ip.split('.').map(Number);
      if(parts.length!==4||parts.some(p=>isNaN(p)||p<0||p>255)) throw new Error('Invalid IP address');
      const ipInt = parts.reduce((a,b)=>((a<<8)|b)>>>0);
      const maskInt = pfx===0?0:(0xFFFFFFFF<<(32-pfx))>>>0;
      const netInt = (ipInt&maskInt)>>>0;
      const bcastInt = (netInt|(~maskInt>>>0))>>>0;
      const hosts = pfx>=31?0:(bcastInt-netInt-1);
      const toIP = n => [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');
      setResult({
        network: toIP(netInt)+'/'+pfx,
        mask: toIP(maskInt),
        broadcast: toIP(bcastInt),
        first: toIP(netInt+1),
        last: toIP(bcastInt-1),
        hosts,
        pfx,
      });
    } catch(e) {
      setError(e.message);
      setResult(null);
    }
  };

  const inputStyle = { background:'var(--bg-elevated)',color:'var(--text-primary)',
    border:`1px solid ${error?'rgba(255,59,92,0.4)':'var(--border)'}`,
    borderRadius:3,padding:'8px 12px',fontSize:13,fontFamily:'var(--font-mono)',
    flex:1,outline:'none',transition:'border 0.15s' };

  return (
    <div>
      <div style={{ display:'flex',gap:8,marginBottom:error?8:0 }}>
        <input value={cidr} onChange={e=>setCidr(e.target.value)} style={inputStyle}
          placeholder="e.g. 10.10.0.0/22" aria-label="CIDR notation input"
          onKeyDown={e=>e.key==='Enter'&&calculate()}/>
        <button onClick={calculate}
          style={{ padding:'8px 16px',background:'rgba(0,212,255,0.12)',color:'var(--accent-cyan)',
            border:'1px solid rgba(0,212,255,0.3)',borderRadius:3,fontSize:11,
            fontFamily:'var(--font-display)',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',
            transition:'all 0.15s',cursor:'pointer' }}
          onMouseEnter={e=>e.currentTarget.style.background='rgba(0,212,255,0.2)'}
          onMouseLeave={e=>e.currentTarget.style.background='rgba(0,212,255,0.12)'}>
          Calculate
        </button>
      </div>
      {error && <div style={{ fontSize:10,color:'#ff3b5c',marginBottom:8 }}>⚠ {error}</div>}
      {result && (
        <div style={{ display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginTop:12, animation:'fadeIn 0.3s ease' }}>
          {[
            ['Network',result.network,'var(--accent-cyan)'],
            ['Subnet Mask',result.mask,'var(--text-primary)'],
            ['Broadcast',result.broadcast,'var(--text-primary)'],
            ['First Host',result.first,'#00ff88'],
            ['Last Host',result.last,'#00ff88'],
            ['Usable Hosts',result.hosts.toLocaleString(),'#9d4edd'],
          ].map(([l,v,c])=>(
            <div key={l} style={{ background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:3,padding:'8px 10px' }}>
              <div style={{ fontSize:9,color:'var(--text-muted)',fontFamily:'var(--font-display)',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:3 }}>{l}</div>
              <div style={{ fontSize:12,fontFamily:'var(--font-mono)',color:c,wordBreak:'break-all' }}>{v}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── ERROR BOUNDARY ───────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  componentDidCatch(e, info) { console.error('[ZimNOC Error]', e, info); }
  render() {
    if (!this.state.error) return this.props.children;
    return (
      <div style={{ minHeight:'100vh', background:'#020508', display:'flex', alignItems:'center',
        justifyContent:'center', padding:32, fontFamily:'Consolas,monospace' }}>
        <div style={{ maxWidth:640, background:'#0e1e2e', border:'1px solid #ff3b5c',
          borderRadius:6, padding:32 }}>
          <div style={{ color:'#ff3b5c', fontSize:18, fontWeight:700, marginBottom:16 }}>
            ⚠ ZimNOC Runtime Error
          </div>
          <pre style={{ color:'#e8f4fd', fontSize:12, whiteSpace:'pre-wrap',
            background:'#060d14', padding:16, borderRadius:4, overflowX:'auto' }}>
            {String(this.state.error)}
          </pre>
          <div style={{ marginTop:16, color:'#7ab0cc', fontSize:11 }}>
            Open the browser DevTools Console for the full stack trace.
          </div>
          <button onClick={()=>window.location.reload()}
            style={{ marginTop:16, padding:'8px 20px', background:'rgba(255,59,92,0.15)',
              color:'#ff3b5c', border:'1px solid rgba(255,59,92,0.4)', borderRadius:3,
              cursor:'pointer', fontFamily:'inherit', fontSize:12 }}>
            Reload
          </button>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
